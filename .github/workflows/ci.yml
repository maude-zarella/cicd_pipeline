# Nom du workflow (affiché dans l'interface GitHub Actions)
name: CI pipeline

# Déclencheurs du workflow
on:
  push:
    branches: [ main ]           # Se lance à chaque push sur la branche main
  pull_request:
    branches: [ main ]           # Se lance lors d'une PR ciblant main
  workflow_dispatch:             # Permet de lancer manuellement le workflow depuis l'UI

# Permissions accordées au workflow (principe du moindre privilège)
permissions:
  contents: read                 # Lecture du dépôt uniquement
  security-events: write         # Permet d'envoyer des résultats de scan sécurité
  actions: read                  # Lecture des actions (utile pour certains usages)

# Définition des jobs (exécutés en parallèle par défaut)
jobs:

  # Job de test
  test:
    runs-on: ubuntu-latest       # Machine virtuelle Ubuntu fournie par GitHub
    
    # Stratégie pour exécuter le job sur plusieurs versions de Python
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10']   # Le job sera exécuté 3 fois (une par version)

    steps:
      # Étape 1 : récupérer le code du dépôt
      - name: Checkout code
        uses: actions/checkout@v3
          # nota : action market place 
          # (https://github.com/marketplace?type=actions)
      
      # Étape 2 : installer Python selon la version définie dans la matrice
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}  # Injecte la version courante
      
      # Étape 3 : installer les dépendances nécessaires aux tests
      # Nota : le "|" permet d'écrire plusieurs commandes sur plusieurs lignes
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip   # Met à jour pip
          pip install flake8 pytest             # Installe linter + framework de test
      
      # Étape 4 : analyse statique du code avec flake8
      - name: Lint with flake8
        run: |
          # Échoue si erreurs critiques (syntaxe, noms non définis, etc.)
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          
          # Ne fait pas échouer le build (warnings uniquement)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
      
      # Étape 5 : exécution des tests unitaires
      - name: Test with pytest
        run: |
          pytest tests/           # Lance les tests dans le dossier tests/

  # Job de scan de vulnérabilités
  trivy-scan:
    runs-on: ubuntu-latest       # Machine Ubuntu

    steps:
      # Étape 1 : récupérer le code
      - name: Checkout code
        uses: actions/checkout@v3

      # Étape 2 : scan de sécurité avec Trivy
      - name: Run Trivy vulnerability scanner in filesystem mode
        uses: aquasecurity/trivy-action@b3dafe507ffa004210975439a1e6156b8ebb3f50
        with:
          scan-type: 'fs'                    # Scan du filesystem (code + dépendances)
          scan-ref: '.'                      # Racine du projet
          format: 'sarif'                    # Format standard pour outils de sécurité
          output: 'trivy-results.sarif'      # Fichier de sortie
          severity: 'CRITICAL,HIGH'          # Ne remonte que les vulnérabilités importantes

      # Étape 3 : upload des résultats dans GitHub Security
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'  # Fichier généré précédemment